<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📁 Chia Sẻ Tệp & Văn Bản An Toàn</title>
  <!-- Font Awesome 6 cho icon đẹp -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #f0f4ff 0%, #e6ecf8 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .app-container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 25px 50px -10px rgba(0,20,50,0.25);
      padding: 20px 20px 28px;
      border: 1px solid rgba(255,255,255,0.7);
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.7rem;
      font-weight: 700;
      color: #0b2b4f;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
    h1 i {
      color: #1e4a7a;
      font-size: 2rem;
      background: #e9f0ff;
      padding: 6px;
      border-radius: 16px;
    }
    .tab-container {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: #f2f5fc;
      padding: 6px;
      border-radius: 50px;
    }
    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      background: transparent;
      border: none;
      color: #3b4b62;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: white;
      box-shadow: 0 8px 18px rgba(0,80,150,0.15);
      color: #0a3a6a;
      font-weight: 700;
    }
    .panel {
      display: none;
      animation: fade 0.25s ease;
    }
    .panel.active {
      display: block;
    }
    @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      border: 1px solid #edf2f9;
    }
    .file-area {
      border: 2px dashed #b7c9e5;
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      background: #fafcff;
      transition: 0.2s;
      cursor: pointer;
    }
    .file-area i {
      font-size: 2.5rem;
      color: #2c5282;
      margin-bottom: 8px;
    }
    .file-list {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .file-tag {
      background: #eef3ff;
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #10355e;
    }
    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid #dce3ef;
      border-radius: 20px;
      padding: 14px 16px;
      font-size: 0.95rem;
      background: #fbfdff;
      resize: vertical;
      margin: 8px 0;
    }
    .btn {
      background: #0f3b5c;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 20px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(9, 50, 90, 0.2);
      width: 100%;
      margin-top: 10px;
    }
    .btn-secondary {
      background: #eef2f9;
      color: #1a3650;
      box-shadow: none;
      font-weight: 600;
    }
    .qr-box {
      background: white;
      padding: 16px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #qrCanvas, #qrCodeContainer canvas {
      max-width: 180px;
      height: auto;
      border-radius: 12px;
    }
    .flex-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hidden {
      display: none;
    }
    .reader-box {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      margin: 12px 0;
    }
    .status-message {
      font-weight: 500;
      color: #1d4b6e;
      background: #eaf3ff;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    <i class="fas fa-shield-alt"></i> Chia sẻ an toàn
  </h1>

  <div class="tab-container">
    <button class="tab-btn active" id="tabSender"><i class="fas fa-upload"></i> Gửi</button>
    <button class="tab-btn" id="tabReceiver"><i class="fas fa-download"></i> Nhận</button>
  </div>

  <!-- PANEL NGƯỜI GỬI -->
  <div id="senderPanel" class="panel active">
    <div class="card">
      <div class="file-area" id="dropArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p><strong>Chạm để chọn tệp</strong><br><small>hoặc kéo thả vào đây</small></p>
        <input type="file" id="fileInput" multiple hidden>
      </div>
      <div id="selectedFilesList" class="file-list"></div>
      <textarea id="textContent" placeholder="Hoặc nhập văn bản muốn chia sẻ..."></textarea>
      <button class="btn" id="generateBtn"><i class="fas fa-qrcode"></i> Tạo Link & Mã QR</button>
    </div>
    <div id="shareResult" class="card hidden">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="status-message"><i class="fas fa-check-circle"></i> <span id="saveConfirm"></span></span>
      </div>
      <div style="margin: 16px 0;">
        <input type="text" id="shareLinkDisplay" readonly placeholder="Link chia sẻ...">
      </div>
      <div class="qr-box" id="qrCodeContainer"></div>
      <div class="flex-row" style="margin-top: 14px;">
        <button class="btn-secondary" id="copyLinkBtn" style="flex:1;"><i class="fas fa-copy"></i> Sao chép link</button>
        <button class="btn-secondary" id="downloadQrBtn" style="flex:1;"><i class="fas fa-download"></i> Tải QR</button>
      </div>
    </div>
  </div>

  <!-- PANEL NGƯỜI NHẬN -->
  <div id="receiverPanel" class="panel">
    <div class="card">
      <button class="btn" id="startScanBtn"><i class="fas fa-camera"></i> Quét mã QR</button>
      <div id="readerContainer" class="reader-box hidden"></div>
      <p style="text-align:center; margin:12px 0;">hoặc</p>
      <input type="text" id="manualCodeInput" placeholder="Nhập mã chia sẻ thủ công">
      <button class="btn" id="fetchByCodeBtn"><i class="fas fa-search"></i> Truy xuất dữ liệu</button>
      <div id="receiverStatus" style="margin-top: 12px;"></div>
    </div>
    <div id="receivedContent" class="card hidden">
      <h4 style="margin-bottom: 10px;"><i class="fas fa-folder-open"></i> Tệp & văn bản nhận được</h4>
      <div id="textPreview" style="background:#f4f7fd; padding:12px; border-radius:16px; margin-bottom:12px;"></div>
      <div id="receivedFilesList" class="file-list" style="margin-bottom:12px;"></div>
      <div class="flex-row">
        <button class="btn-secondary" id="downloadAllBtn"><i class="fas fa-download"></i> Tải tất cả</button>
      </div>
    </div>
  </div>
</div>

<!-- Thư viện QR code & html5-qrcode -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
  (function() {
    // ---------- STORAGE ENGINE ----------
    const STORAGE_KEY = 'secure_share_db';
    function getDB() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    }
    function saveDB(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    // Lưu dữ liệu vào mã chia sẻ: { files: [{name, dataUrl}], text: string }
    function storeShareData(code, filesArray, text) {
      const db = getDB();
      db[code] = {
        files: filesArray,  // mỗi file: { name, dataUrl (base64) }
        text: text || '',
        created: Date.now()
      };
      saveDB(db);
    }

    function getShareData(code) {
      const db = getDB();
      return db[code] || null;
    }

    // ---------- GLOBAL STATE ----------
    let selectedFiles = []; // { name, dataUrl }
    const senderPanel = document.getElementById('senderPanel');
    const receiverPanel = document.getElementById('receiverPanel');
    const tabSender = document.getElementById('tabSender');
    const tabReceiver = document.getElementById('tabReceiver');

    // Chuyển tab
    tabSender.addEventListener('click', ()=>{
      tabSender.classList.add('active');
      tabReceiver.classList.remove('active');
      senderPanel.classList.add('active');
      receiverPanel.classList.remove('active');
      stopScanner();
    });
    tabReceiver.addEventListener('click', ()=>{
      tabReceiver.classList.add('active');
      tabSender.classList.remove('active');
      receiverPanel.classList.add('active');
      senderPanel.classList.remove('active');
    });

    // ----- FILE SELECTION (NGƯỜI GỬI) -----
    const fileInput = document.getElementById('fileInput');
    const dropArea = document.getElementById('dropArea');
    const selectedFilesList = document.getElementById('selectedFilesList');
    const textContent = document.getElementById('textContent');

    dropArea.addEventListener('click', ()=> fileInput.click());
    fileInput.addEventListener('change', handleFiles);
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.style.borderColor='#1e4a7a'; });
    dropArea.addEventListener('dragleave', ()=> dropArea.style.borderColor='#b7c9e5');
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.style.borderColor='#b7c9e5';
      if(e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
    });

    function handleFiles(e) {
      if(e.target.files.length) processFiles(e.target.files);
      fileInput.value = '';
    }

    function processFiles(fileList) {
      Array.from(fileList).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          selectedFiles.push({ name: file.name, dataUrl: ev.target.result });
          renderSelectedFiles();
        };
        reader.readAsDataURL(file);
      });
    }

    function renderSelectedFiles() {
      selectedFilesList.innerHTML = selectedFiles.map(f => 
        `<span class="file-tag"><i class="fas fa-file"></i> ${f.name} <i class="fas fa-times" style="cursor:pointer; margin-left:6px;" data-name="${f.name}"></i></span>`
      ).join('');
      document.querySelectorAll('.file-tag .fa-times').forEach(icon => {
        icon.addEventListener('click', (e) => {
          const name = e.target.getAttribute('data-name');
          selectedFiles = selectedFiles.filter(f => f.name !== name);
          renderSelectedFiles();
        });
      });
    }

    // ----- TẠO CHIA SẺ (NGƯỜI GỬI) -----
    const generateBtn = document.getElementById('generateBtn');
    const shareResult = document.getElementById('shareResult');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');
    const qrCodeContainer = document.getElementById('qrCodeContainer');
    const saveConfirm = document.getElementById('saveConfirm');

    function generateUniqueCode() {
      return 's' + Date.now().toString(36) + Math.random().toString(36).substring(2,6);
    }

    generateBtn.addEventListener('click', ()=>{
      const textVal = textContent.value.trim();
      if (selectedFiles.length === 0 && textVal === '') {
        alert('Vui lòng chọn ít nhất một tệp hoặc nhập văn bản.');
        return;
      }
      // Tạo mã duy nhất
      const code = generateUniqueCode();
      // Lưu chính xác dữ liệu vào kho
      storeShareData(code, [...selectedFiles], textVal);
      
      const shareLink = `${window.location.origin}${window.location.pathname}?code=${code}`;
      shareLinkDisplay.value = shareLink;
      saveConfirm.textContent = `Đã lưu tệp thành công – Mã chia sẻ: ${code}`;
      
      // Tạo QR code
      qrCodeContainer.innerHTML = ''; 
      const canvas = document.createElement('canvas');
      QRCode.toCanvas(canvas, shareLink, { width: 180, margin: 1 }, (error) => {
        if (error) console.warn(error);
      });
      qrCodeContainer.appendChild(canvas);
      shareResult.classList.remove('hidden');
    });

    // Sao chép link
    document.getElementById('copyLinkBtn').addEventListener('click', ()=>{
      navigator.clipboard.writeText(shareLinkDisplay.value).then(()=> alert('Đã sao chép link!'));
    });
    // Tải QR
    document.getElementById('downloadQrBtn').addEventListener('click', ()=>{
      const canvas = qrCodeContainer.querySelector('canvas');
      if(canvas) {
        const link = document.createElement('a');
        link.download = 'qr-share.png';
        link.href = canvas.toDataURL();
        link.click();
      }
    });

    // ----- PHẦN NGƯỜI NHẬN -----
    const manualCodeInput = document.getElementById('manualCodeInput');
    const fetchByCodeBtn = document.getElementById('fetchByCodeBtn');
    const receiverStatus = document.getElementById('receiverStatus');
    const receivedContent = document.getElementById('receivedContent');
    const textPreview = document.getElementById('textPreview');
    const receivedFilesList = document.getElementById('receivedFilesList');
    let currentReceivedData = null;

    function displayReceivedData(data) {
      currentReceivedData = data;
      textPreview.innerHTML = data.text ? `<strong>📝 Văn bản:</strong><br>${data.text.replace(/\n/g, '<br>')}` : '';
      receivedFilesList.innerHTML = data.files.map((f, idx) => 
        `<span class="file-tag"><i class="fas fa-paperclip"></i> ${f.name} <i class="fas fa-download" style="cursor:pointer; margin-left:6px;" data-idx="${idx}"></i></span>`
      ).join('');
      document.querySelectorAll('.fa-download[data-idx]').forEach(icon => {
        icon.addEventListener('click', (e) => {
          const idx = e.target.getAttribute('data-idx');
          if(currentReceivedData?.files[idx]) {
            downloadFile(currentReceivedData.files[idx].dataUrl, currentReceivedData.files[idx].name);
          }
        });
      });
      receivedContent.classList.remove('hidden');
    }

    function downloadFile(dataUrl, fileName) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = fileName;
      a.click();
    }

    function fetchAndDisplay(code) {
      if(!code) {
        receiverStatus.innerHTML = '<span style="color:red;">Vui lòng nhập mã.</span>';
        return;
      }
      const data = getShareData(code);
      if(!data) {
        receiverStatus.innerHTML = '<span style="color:#b91c1c;">❌ Mã không tồn tại hoặc đã hết hạn.</span>';
        receivedContent.classList.add('hidden');
        return;
      }
      receiverStatus.innerHTML = '<span style="color:#0f5c3b;">✅ Đã tìm thấy dữ liệu chia sẻ.</span>';
      displayReceivedData(data);
    }

    fetchByCodeBtn.addEventListener('click', ()=>{
      fetchAndDisplay(manualCodeInput.value.trim());
    });

    // Tải tất cả file
    document.getElementById('downloadAllBtn').addEventListener('click', ()=>{
      if(!currentReceivedData || !currentReceivedData.files.length) return;
      currentReceivedData.files.forEach(f => downloadFile(f.dataUrl, f.name));
    });

    // ----- QUÉT QR (HTML5-QRCODE) -----
    const startScanBtn = document.getElementById('startScanBtn');
    const readerContainer = document.getElementById('readerContainer');
    let html5QrCode = null;

    function stopScanner() {
      if(html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
          readerContainer.innerHTML = '';
          readerContainer.classList.add('hidden');
        }).catch(err => console.warn);
        html5QrCode = null;
      }
    }

    startScanBtn.addEventListener('click', ()=>{
      if(html5QrCode && html5QrCode.isScanning) {
        stopScanner();
        return;
      }
      readerContainer.classList.remove('hidden');
      readerContainer.innerHTML = ''; 
      const div = document.createElement('div');
      div.id = 'qr-reader';
      readerContainer.appendChild(div);
      
      html5QrCode = new Html5Qrcode("qr-reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          // Quét thành công
          stopScanner();
          try {
            const url = new URL(decodedText);
            const codeParam = url.searchParams.get('code');
            if(codeParam) {
              manualCodeInput.value = codeParam;
              fetchAndDisplay(codeParam);
            } else {
              alert('QR không chứa mã hợp lệ.');
            }
          } catch (e) {
            // Có thể là mã thuần
            manualCodeInput.value = decodedText;
            fetchAndDisplay(decodedText);
          }
        },
        (errorMessage) => { /* quét tiếp */ }
      ).catch(err => {
        alert('Không thể truy cập camera: ' + err);
        stopScanner();
      });
    });

    // Kiểm tra nếu URL có tham số code khi tải trang
    window.addEventListener('load', ()=>{
      const params = new URLSearchParams(window.location.search);
      const codeFromUrl = params.get('code');
      if(codeFromUrl) {
        // Chuyển sang tab nhận
        tabReceiver.click();
        manualCodeInput.value = codeFromUrl;
        fetchAndDisplay(codeFromUrl);
      }
    });

    // Dọn dẹp scanner khi rời trang
    window.addEventListener('beforeunload', ()=>{ stopScanner(); });
  })();
</script>
</body>
</html>
